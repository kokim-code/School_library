services:
  db:
    image: postgres:16-alpine
    container_name: school-library-db
    environment:
      POSTGRES_DB: school_library
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - school-library-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d school_library"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: school-library-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=school_library;Username=postgres;Password=postgres
    ports:
      - "8080:8080"

volumes:
  school-library-data:
